<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d5a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8961a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0c040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8961a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="maroonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9e2a40;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="templeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base platform -->
  <rect x="20" y="480" width="360" height="30" rx="4" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <rect x="40" y="470" width="320" height="16" rx="3" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>

  <!-- Main temple base -->
  <rect x="80" y="400" width="240" height="72" rx="3" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <!-- Base decorative band -->
  <rect x="80" y="400" width="240" height="8" fill="url(#goldGrad)" rx="1"/>
  <rect x="80" y="462" width="240" height="8" fill="url(#goldGrad)" rx="1"/>
  <!-- Base pillars -->
  <rect x="100" y="408" width="18" height="54" fill="#e8d5a3" stroke="#c8961a" stroke-width="1"/>
  <rect x="182" y="408" width="18" height="54" fill="#e8d5a3" stroke="#c8961a" stroke-width="1"/>
  <rect x="264" y="408" width="18" height="54" fill="#e8d5a3" stroke="#c8961a" stroke-width="1"/>
  <!-- Pillar caps -->
  <rect x="96" y="404" width="26" height="6" rx="2" fill="url(#goldGrad)"/>
  <rect x="178" y="404" width="26" height="6" rx="2" fill="url(#goldGrad)"/>
  <rect x="260" y="404" width="26" height="6" rx="2" fill="url(#goldGrad)"/>

  <!-- Middle tower body -->
  <rect x="120" y="310" width="160" height="94" rx="2" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <rect x="120" y="310" width="160" height="7" fill="url(#goldGrad)"/>
  <rect x="120" y="395" width="160" height="7" fill="url(#goldGrad)"/>
  <!-- Middle pillars -->
  <rect x="136" y="318" width="14" height="76" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="193" y="318" width="14" height="76" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="250" y="318" width="14" height="76" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <!-- Middle decorative carvings -->
  <ellipse cx="162" cy="350" rx="18" ry="22" fill="none" stroke="#c8961a" stroke-width="1.2"/>
  <ellipse cx="200" cy="350" rx="18" ry="22" fill="none" stroke="#c8961a" stroke-width="1.2"/>
  <ellipse cx="238" cy="350" rx="18" ry="22" fill="none" stroke="#c8961a" stroke-width="1.2"/>
  <!-- Deity silhouettes inside arches -->
  <ellipse cx="162" cy="348" rx="8" ry="10" fill="#d4a050" opacity="0.6"/>
  <ellipse cx="200" cy="348" rx="8" ry="10" fill="#d4a050" opacity="0.6"/>
  <ellipse cx="238" cy="348" rx="8" ry="10" fill="#d4a050" opacity="0.6"/>

  <!-- Gopuram tier 1 (bottom wide) -->
  <polygon points="100,310 300,310 290,270 110,270" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <polygon points="100,310 300,310 300,316 100,316" fill="url(#goldGrad)"/>
  <polygon points="110,270 290,270 290,276 110,276" fill="url(#goldGrad)"/>
  <!-- Tier 1 decorations -->
  <rect x="130" y="278" width="12" height="26" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="155" y="278" width="12" height="26" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="180" y="278" width="12" height="26" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="205" y="278" width="12" height="26" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="230" y="278" width="12" height="26" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="255" y="278" width="12" height="26" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>

  <!-- Gopuram tier 2 -->
  <polygon points="118,270 282,270 274,236 126,236" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <polygon points="118,270 282,270 282,276 118,276" fill="url(#goldGrad)"/>
  <polygon points="126,236 274,236 274,242 126,242" fill="url(#goldGrad)"/>
  <!-- Tier 2 mini sculptures -->
  <ellipse cx="160" cy="254" rx="10" ry="13" fill="none" stroke="#c8961a" stroke-width="1"/>
  <ellipse cx="200" cy="254" rx="10" ry="13" fill="none" stroke="#c8961a" stroke-width="1"/>
  <ellipse cx="240" cy="254" rx="10" ry="13" fill="none" stroke="#c8961a" stroke-width="1"/>

  <!-- Gopuram tier 3 -->
  <polygon points="134,236 266,236 260,204 140,204" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <polygon points="134,236 266,236 266,242 134,242" fill="url(#goldGrad)"/>
  <polygon points="140,204 260,204 260,210 140,210" fill="url(#goldGrad)"/>
  <!-- Tier 3 ornaments -->
  <rect x="158" y="212" width="10" height="20" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="178" y="212" width="10" height="20" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="198" y="212" width="10" height="20" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="218" y="212" width="10" height="20" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>
  <rect x="238" y="212" width="10" height="20" rx="2" fill="#eddcac" stroke="#c8961a" stroke-width="0.8"/>

  <!-- Gopuram tier 4 -->
  <polygon points="148,204 252,204 246,176 154,176" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <polygon points="148,204 252,204 252,210 148,210" fill="url(#goldGrad)"/>
  <polygon points="154,176 246,176 246,182 154,182" fill="url(#goldGrad)"/>
  <!-- Tier 4 detail -->
  <ellipse cx="180" cy="190" rx="9" ry="11" fill="none" stroke="#c8961a" stroke-width="0.9"/>
  <ellipse cx="200" cy="190" rx="9" ry="11" fill="none" stroke="#c8961a" stroke-width="0.9"/>
  <ellipse cx="220" cy="190" rx="9" ry="11" fill="none" stroke="#c8961a" stroke-width="0.9"/>

  <!-- Gopuram tier 5 -->
  <polygon points="160,176 240,176 235,150 165,150" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <polygon points="160,176 240,176 240,182 160,182" fill="url(#goldGrad)"/>
  <polygon points="165,150 235,150 235,156 165,156" fill="url(#goldGrad)"/>

  <!-- Gopuram tier 6 -->
  <polygon points="170,150 230,150 225,126 175,126" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <polygon points="170,150 230,150 230,156 170,156" fill="url(#goldGrad)"/>
  <polygon points="175,126 225,126 225,132 175,132" fill="url(#goldGrad)"/>

  <!-- Gopuram tier 7 -->
  <polygon points="178,126 222,126 218,104 182,104" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <polygon points="178,126 222,126 222,132 178,132" fill="url(#goldGrad)"/>
  <polygon points="182,104 218,104 218,110 182,110" fill="url(#goldGrad)"/>

  <!-- Top rounded finial (Kalasha) -->
  <ellipse cx="200" cy="92" rx="22" ry="16" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1.5"/>
  <ellipse cx="200" cy="92" rx="16" ry="10" fill="url(#goldGrad)"/>
  <!-- Kalasha pot -->
  <ellipse cx="200" cy="76" rx="10" ry="14" fill="url(#goldGrad)" stroke="#c8961a" stroke-width="1"/>
  <ellipse cx="200" cy="66" rx="7" ry="4" fill="#f0c040"/>
  <!-- Top spike -->
  <line x1="200" y1="62" x2="200" y2="40" stroke="#c8961a" stroke-width="2.5"/>
  <circle cx="200" cy="38" r="5" fill="url(#goldGrad)" stroke="#c8961a" stroke-width="1"/>
  <circle cx="200" cy="28" r="3.5" fill="#f0c040"/>
  <line x1="200" y1="24" x2="200" y2="14" stroke="#c8961a" stroke-width="1.5"/>
  <circle cx="200" cy="12" r="3" fill="#f0c040"/>

  <!-- Flag at top -->
  <line x1="200" y1="10" x2="200" y2="2" stroke="#c8961a" stroke-width="1"/>
  <polygon points="200,2 218,6 200,10" fill="#9e2a40" opacity="0.9"/>

  <!-- Decorative lotus at base -->
  <ellipse cx="200" cy="476" rx="30" ry="6" fill="#f0c040" opacity="0.4"/>
  <ellipse cx="200" cy="476" rx="20" ry="4" fill="#f0c040" opacity="0.5"/>

  <!-- Side mini towers (left) -->
  <rect x="28" y="430" width="50" height="42" rx="2" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>
  <polygon points="18,430 88,430 82,400 24,400" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>
  <polygon points="22,400 78,400 74,376 26,376" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>
  <polygon points="26,376 74,376 70,358 30,358" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>
  <ellipse cx="53" cy="368" rx="6" ry="8" fill="#c8961a" opacity="0.5"/>
  <circle cx="53" cy="353" r="5" fill="url(#goldGrad)"/>
  <line x1="53" y1="348" x2="53" y2="342" stroke="#c8961a" stroke-width="1.5"/>
  <circle cx="53" cy="340" r="2.5" fill="#f0c040"/>
  <!-- Left tower bands -->
  <rect x="18" y="430" width="70" height="4" fill="url(#goldGrad)"/>
  <rect x="22" y="400" width="66" height="4" fill="url(#goldGrad)"/>
  <rect x="26" y="376" width="62" height="4" fill="url(#goldGrad)"/>
  <rect x="30" y="358" width="58" height="4" fill="url(#goldGrad)"/>

  <!-- Side mini towers (right) -->
  <rect x="322" y="430" width="50" height="42" rx="2" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>
  <polygon points="312,430 382,430 376,400 318,400" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>
  <polygon points="322,400 378,400 374,376 326,376" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>
  <polygon points="326,376 374,376 370,358 330,358" fill="url(#stoneGrad)" stroke="#c8961a" stroke-width="1"/>
  <ellipse cx="348" cy="368" rx="6" ry="8" fill="#c8961a" opacity="0.5"/>
  <circle cx="348" cy="353" r="5" fill="url(#goldGrad)"/>
  <line x1="348" y1="348" x2="348" y2="342" stroke="#c8961a" stroke-width="1.5"/>
  <circle cx="348" cy="340" r="2.5" fill="#f0c040"/>
  <!-- Right tower bands -->
  <rect x="312" y="430" width="70" height="4" fill="url(#goldGrad)"/>
  <rect x="318" y="400" width="66" height="4" fill="url(#goldGrad)"/>
  <rect x="326" y="376" width="62" height="4" fill="url(#goldGrad)"/>
  <rect x="330" y="358" width="58" height="4" fill="url(#goldGrad)"/>

  <!-- Decorative flowers at base corners -->
  <circle cx="80" cy="477" r="8" fill="#9e2a40" opacity="0.5"/>
  <circle cx="80" cy="477" r="4" fill="#f0c040"/>
  <circle cx="320" cy="477" r="8" fill="#9e2a40" opacity="0.5"/>
  <circle cx="320" cy="477" r="4" fill="#f0c040"/>

  <!-- Ground decorative strip -->
  <rect x="0" y="508" width="400" height="12" fill="url(#goldGrad)" opacity="0.6"/>
</svg>
