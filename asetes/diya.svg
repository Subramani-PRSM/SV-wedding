<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 200" width="80" height="200">
  <defs>
    <linearGradient id="ropeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5E2D;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#C4923C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5E2D;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lampBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A820;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#C8791A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B4A0A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#FFAA00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFFF80;stop-opacity:0.6"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:0"/>
    </radialGradient>
    <filter id="lampGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rope / chain from top -->
  <line x1="40" y1="0" x2="40" y2="30" stroke="url(#ropeGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chain links -->
  <ellipse cx="40" cy="8" rx="3" ry="1.5" fill="none" stroke="#C4923C" stroke-width="1.2"/>
  <ellipse cx="40" cy="14" rx="1.5" ry="3" fill="none" stroke="#C4923C" stroke-width="1.2"/>
  <ellipse cx="40" cy="20" rx="3" ry="1.5" fill="none" stroke="#C4923C" stroke-width="1.2"/>
  <ellipse cx="40" cy="26" rx="1.5" ry="3" fill="none" stroke="#C4923C" stroke-width="1.2"/>

  <!-- Hook/hanging bracket -->
  <path d="M32,30 Q40,26 48,30" fill="none" stroke="#C4923C" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="30" x2="32" y2="38" stroke="#C4923C" stroke-width="2"/>
  <line x1="48" y1="30" x2="48" y2="38" stroke="#C4923C" stroke-width="2"/>

  <!-- Decorative top of lamp -->
  <ellipse cx="40" cy="38" rx="16" ry="4" fill="url(#lampBody)" stroke="#8B4A0A" stroke-width="1"/>
  <rect x="24" y="36" width="32" height="4" rx="2" fill="#E8A820"/>

  <!-- Lamp body - wide belly -->
  <path d="M26,38 Q16,55 18,75 Q22,90 40,94 Q58,90 62,75 Q64,55 54,38 Z" fill="url(#lampBody)" stroke="#8B4A0A" stroke-width="1.5"/>

  <!-- Lamp body decorative band -->
  <ellipse cx="40" cy="60" rx="22" ry="5" fill="none" stroke="#E8A820" stroke-width="1.5" opacity="0.7"/>

  <!-- Lamp engravings / patterns -->
  <ellipse cx="40" cy="68" rx="10" ry="12" fill="none" stroke="#E8A820" stroke-width="1" opacity="0.6"/>
  <!-- Petal decorations -->
  <path d="M34,64 Q40,58 46,64 Q40,70 34,64" fill="#E8A820" opacity="0.4"/>
  <path d="M36,62 Q40,56 44,62 Q40,68 36,62" fill="none" stroke="#E8A820" stroke-width="0.8" opacity="0.7"/>

  <!-- Lamp base neck -->
  <path d="M18,75 Q22,90 26,94" fill="none" stroke="#8B4A0A" stroke-width="0"/>
  <path d="M62,75 Q58,90 54,94" fill="none" stroke="#8B4A0A" stroke-width="0"/>

  <!-- Lamp neck taper -->
  <path d="M26,92 Q30,100 32,108 Q34,114 36,116 Q40,120 44,116 Q46,114 48,108 Q50,100 54,92 Q46,96 40,96 Q34,96 26,92 Z" fill="url(#lampBody)" stroke="#8B4A0A" stroke-width="1.2"/>

  <!-- Lamp base dish (diyo) -->
  <ellipse cx="40" cy="120" rx="18" ry="5" fill="#C4923C" stroke="#8B4A0A" stroke-width="1.2"/>
  <path d="M22,120 Q24,132 40,134 Q56,132 58,120" fill="#E8A820" stroke="#8B4A0A" stroke-width="1"/>
  <ellipse cx="40" cy="134" rx="12" ry="3" fill="#C4923C" stroke="#8B4A0A" stroke-width="1"/>

  <!-- Oil surface in dish -->
  <ellipse cx="40" cy="120" rx="14" ry="3.5" fill="#FFD080" opacity="0.6"/>

  <!-- Wick -->
  <ellipse cx="40" cy="116" rx="2" ry="4" fill="#4A3010" opacity="0.8"/>

  <!-- Glow effect -->
  <ellipse cx="40" cy="108" rx="20" ry="20" fill="url(#glowGrad)" opacity="0.5"/>

  <!-- Flame -->
  <path d="M40,116 Q36,108 37,100 Q39,92 40,88 Q41,92 43,100 Q44,108 40,116 Z" fill="url(#flameGrad)" filter="url(#lampGlow)"/>
  <!-- Inner flame -->
  <path d="M40,114 Q38,108 38.5,102 Q39.5,96 40,93 Q40.5,96 41.5,102 Q42,108 40,114 Z" fill="#FFFF80" opacity="0.8"/>

  <!-- Flame tip sparkle -->
  <circle cx="40" cy="88" r="2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="38" cy="91" r="1" fill="#FFFF80" opacity="0.6"/>
  <circle cx="42" cy="91" r="1" fill="#FFFF80" opacity="0.6"/>

  <!-- Hanging decorative chains on sides -->
  <!-- Left chain -->
  <line x1="22" y1="38" x2="10" y2="55" stroke="#C4923C" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="10" cy="57" r="3" fill="#E8A820"/>
  <line x1="22" y1="55" x2="12" y2="70" stroke="#C4923C" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="12" cy="72" r="2.5" fill="#E8A820"/>
  <!-- Right chain -->
  <line x1="58" y1="38" x2="70" y2="55" stroke="#C4923C" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="70" cy="57" r="3" fill="#E8A820"/>
  <line x1="58" y1="55" x2="68" y2="70" stroke="#C4923C" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="68" cy="72" r="2.5" fill="#E8A820"/>

  <!-- Decorative bottom tassel -->
  <line x1="40" y1="136" x2="40" y2="150" stroke="#C4923C" stroke-width="1.5"/>
  <line x1="35" y1="142" x2="40" y2="150" stroke="#C4923C" stroke-width="1"/>
  <line x1="45" y1="142" x2="40" y2="150" stroke="#C4923C" stroke-width="1"/>
  <circle cx="40" cy="152" r="4" fill="#E8A820"/>
  <circle cx="33" cy="148" r="2.5" fill="#C4923C"/>
  <circle cx="47" cy="148" r="2.5" fill="#C4923C"/>

  <!-- Tiny sparkles around flame -->
  <circle cx="30" cy="95" r="1.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="52" cy="98" r="1" fill="#FFD700" opacity="0.5"/>
  <circle cx="28" cy="105" r="1" fill="#FFD700" opacity="0.4"/>
  <circle cx="53" cy="108" r="1.5" fill="#FFD700" opacity="0.6"/>
</svg>
